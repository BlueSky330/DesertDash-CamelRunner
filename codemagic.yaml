workflows:
  unity-ios-appstore:
    name: Desert Dash — iOS App Store Release
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      unity: 2022.3.62f1
      groups:
        - unity_credentials      # UNITY_SERIAL, UNITY_EMAIL, UNITY_PASSWORD
        - apple_credentials      # APP_STORE_CONNECT_PRIVATE_KEY, APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_ISSUER_ID
        - apple_signing          # CM_CERTIFICATE, CM_CERTIFICATE_PASSWORD, CM_PROVISIONING_PROFILE
      vars:
        BUNDLE_ID: "com.aigamefactory.desertdash"
        XCODE_SCHEME: "Unity-iPhone"
        XCODE_CONFIGURATION: "Release"
    scripts:
      - name: Activate Unity license
        script: |
          $UNITY_HOME/Unity \
            -batchmode -quit -logFile /dev/stdout \
            -serial "$UNITY_SERIAL" \
            -username "$UNITY_EMAIL" \
            -password "$UNITY_PASSWORD"
      - name: Build Unity iOS Xcode project
        script: |
          $UNITY_HOME/Unity \
            -batchmode -quit -logFile /dev/stdout \
            -projectPath . \
            -buildTarget iOS \
            -executeMethod BuildScript.PerformIOSBuild \
            -nographics
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build and archive IPA
        script: |
          XCWORKSPACE=$(find "$CM_BUILD_DIR/ios" -name '*.xcworkspace' | head -1)
          xcode-project build-ipa \
            --workspace "$XCWORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config "$XCODE_CONFIGURATION"
    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
        submit_to_app_store: false
